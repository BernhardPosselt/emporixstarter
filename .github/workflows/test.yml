name: Test

on:
  push:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
      - name: Run backend tests
        uses: ./.github/actions/run-tests
        with:
          directory: "backend"
  common-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
      - name: Run common tests
        uses: ./.github/actions/run-tests
        with:
          directory: "common"
