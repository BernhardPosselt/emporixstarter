name: Test

on:
  push:

jobs:
  setup-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        # pin to hash to avoid attacks changing tags to vulnerable version
        uses: docker/setup-compose-action@4eb059f
  backend-test:
    runs-on: ubuntu-latest
    needs: setup-test
    steps:
      - name: Setup mounted volumes
        run: mkdir -p build/test-results build/jacoco && chown -R 1000:1000 build
        working-directory: backend
      - name: Run backend tests
        run: docker compose -f docker-compose-ci.yml build && docker compose -f docker-compose-ci.yml up
        working-directory: backend
  common-test:
    runs-on: ubuntu-latest
    needs: setup-test
    steps:
      - name: Setup mounted volumes
        run: mkdir -p build/test-results build/jacoco && chown -R 1000:1000 build
        working-directory: backend
      - name: Run common tests
        run: docker compose -f docker-compose-ci.yml build && docker compose -f docker-compose-ci.yml up
        working-directory: common